# Custom Shell Script / Command Execution
# The 'action' field supports executing any shell command or script.
# - You can provide a full path to a script file (e.g., "/path/to/script.sh argument")
# - You can write inline shell commands (e.g., "notify-send 'Title' 'Message'")
# - Commands are executed in a detached process.

# Example: Executing a script with arguments
[[menu]]
label = "ScreenShot"
icon = "camera-photo"
action = "/home/kita/.config/hypr/lib/screenshot.sh s"
children = []

# Example: Inline shell command
[[menu]]
label = "Say Hi"
icon = "user-info"
action = "notify-send 'Waypie' 'Hello from the radial menu!'"
children = []

